syntax = "proto3";

import "google/protobuf/empty.proto";

package mono.auth;

option go_package = "mono/pb/auth";

service AuthService{
  rpc Register(RegisterReq) returns (google.protobuf.Empty);
  rpc Login(LoginReq) returns (LoginResp);
  rpc Refresh(RefreshReq)returns (RefreshResp);
}

message RegisterReq {
  string account = 1;
  string password = 2;

  string nickname = 10;
  string avatar = 11;
}

message LoginReq {
  string account = 1;
  string password = 2;
}

message LoginResp {
  string access_token = 1;
  string refresh_token = 2;

  int64 uid = 10;
  string avatar = 11;
  string nickname = 12;
}

message RefreshReq {
  string refresh_token = 1;
}

message RefreshResp {
  string access_token = 1;
  string refresh_token = 2;
}


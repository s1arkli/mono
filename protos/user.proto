syntax = "proto3";

import "google/protobuf/empty.proto";

package mono.user;

option go_package = "mono/pb/user";

service User {
  rpc GetUserInfo(GetUserReq) returns (GetUserResp);
  rpc BatchGetUserInfo(BatchGetUserReq) returns (BatchGetUserResp);
  rpc UpdateUser(UpdateUserReq) returns (google.protobuf.Empty);
  rpc CreateUser(CreateUserReq) returns (google.protobuf.Empty);
}

message GetUserReq {
  int64 uid = 1;
}

message GetUserResp {
  int64 uid = 1;
  string  nickname = 2;
  string avatar = 3;
}

message BatchGetUserReq {
  repeated int64 uids = 1;
}

message BatchGetUserResp {
  map<int64,GetUserResp>  users = 1;
}

message UpdateUserReq {
  int64 uid = 1;

  string nickname = 10;
  string avatar = 11;
}

message CreateUserReq {
  int64 uid = 1;

  string nickname = 10;
  string avatar = 11;
}

